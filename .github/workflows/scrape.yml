name: scrape-and-publish

on:
  schedule:
    # Every 3 hours. Public-repo scheduled runs can be skipped under GitHub
    # load; 3h cadence plus a 12h healthchecks.io grace absorbs typical skips.
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  # Needed to open/update/close the failure-tracking issue.
  issues: write

concurrency:
  group: scrape-and-publish
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Retry once on transient failures (NIST outages, runner hiccups).
      # The scraper is idempotent, so a second attempt re-runs from scratch.
      - name: Run scraper
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          timeout_minutes: 170
          max_attempts: 2
          command: python3 nvd.py

      - name: Verify output looks sane
        run: |
          set -euo pipefail
          test -f nvd.json
          test -f nvd.jsonl
          test -f metadata.json
          bytes=$(stat -c %s nvd.json)
          echo "nvd.json size: $bytes"
          if [ "$bytes" -lt 100000000 ]; then
            echo "nvd.json is suspiciously small ($bytes bytes) — aborting upload"
            exit 1
          fi
          head -c 1 nvd.json | grep -q '\['
          tail -c 1 nvd.json | grep -q '\]'

      - name: Install rclone
        uses: AnimMouse/setup-rclone@26ef2133e09fd383329a1d4c1fbe6a71db1976c9 # v1.12.0

      - name: Configure rclone for R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          mkdir -p ~/.config/rclone
          {
            echo '[r2]'
            echo 'type = s3'
            echo 'provider = Cloudflare'
            echo "access_key_id = $R2_ACCESS_KEY_ID"
            echo "secret_access_key = $R2_SECRET_ACCESS_KEY"
            echo "endpoint = https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
            echo 'acl = private'
          } > ~/.config/rclone/rclone.conf

      - name: Upload to R2
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          rclone copyto --s3-chunk-size 64M --s3-upload-concurrency 4 --s3-no-check-bucket \
            --header-upload "Content-Type: application/json" \
            --header-upload "Cache-Control: public, max-age=900" \
            nvd.json "r2:$R2_BUCKET/nvd.json"
          rclone copyto --s3-chunk-size 64M --s3-upload-concurrency 4 --s3-no-check-bucket \
            --header-upload "Content-Type: application/json" \
            --header-upload "Cache-Control: public, max-age=900" \
            nvd.jsonl "r2:$R2_BUCKET/nvd.jsonl"
          rclone copyto --s3-no-check-bucket \
            --header-upload "Content-Type: application/json" \
            --header-upload "Cache-Control: no-cache" \
            metadata.json "r2:$R2_BUCKET/metadata.json"
          rclone copyto --s3-no-check-bucket \
            --header-upload "Content-Type: text/html; charset=utf-8" \
            --header-upload "Cache-Control: public, max-age=300" \
            index.html "r2:$R2_BUCKET/index.html"

      - name: Purge Cloudflare cache for nvd subdomain
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl --fail -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://nvd.handsonhacking.org/","https://nvd.handsonhacking.org/index.html","https://nvd.handsonhacking.org/nvd.json","https://nvd.handsonhacking.org/nvd.jsonl","https://nvd.handsonhacking.org/metadata.json"]}'

      - name: Ping healthchecks.io
        if: success()
        env:
          HEALTHCHECKS_PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
        run: curl --fail --retry 3 "$HEALTHCHECKS_PING_URL"

      # On failure, last-known-good in R2 is untouched (upload only runs on a
      # clean scrape). Open or update a single tracking issue so a failure is
      # visible instead of buried in the Actions tab.
      - name: Open or update failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          gh label create scrape-failure --color B60205 \
            --description "Automated: scrape pipeline failure" --force || true
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          body=$(printf '%s\n\n%s\n%s\n\n%s' \
            "The scrape-and-publish run failed." \
            "When (UTC): $ts" \
            "Run log: $RUN_URL" \
            "Last-known-good data in R2 is untouched (upload only runs on a clean scrape).")
          existing="$(gh issue list --state open --label scrape-failure \
            --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Scrape pipeline failure" \
              --label scrape-failure --body "$body"
          fi

      # When a run succeeds again, close any open failure issue so it doubles
      # as a recovered/not-recovered signal.
      - name: Close failure issue on recovery
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          for n in $(gh issue list --state open --label scrape-failure \
            --json number --jq '.[].number'); do
            gh issue comment "$n" --body "Recovered: a later run succeeded. $RUN_URL"
            gh issue close "$n"
          done
