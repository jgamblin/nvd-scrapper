name: probe-nvd-direct

# One-shot diagnostic: can GitHub Actions reach the NVD API directly
# with a valid apiKey? If yes, the proxy Worker can be retired.
#
# Safe to run any time — makes a single GET, prints status + a short
# preview of the response body, and exits. No writes, no side effects.
# Delete this workflow after the question is answered.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe NVD from this runner
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          UA_BROWSER: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/58.0.3029.110 Safari/537.3"
          NVD_URL: "https://services.nvd.nist.gov/rest/json/cves/2.0/?startIndex=0&resultsPerPage=1"
        run: |
          set -u
          echo "=== runner public IP ==="
          curl -sS --max-time 5 https://ifconfig.me; echo
          echo

          echo "=== apiKey header length (should be 36) ==="
          echo "${#NVD_API_KEY}"
          echo

          echo "=== Test 1: no UA, no key ==="
          curl -sS -o /tmp/r1 -w "HTTP %{http_code}  time=%{time_total}s\n" --max-time 20 \
            "$NVD_URL"
          head -c 200 /tmp/r1; echo; echo

          echo "=== Test 2: browser UA, no key ==="
          curl -sS -o /tmp/r2 -w "HTTP %{http_code}  time=%{time_total}s\n" --max-time 20 \
            -H "User-Agent: $UA_BROWSER" \
            "$NVD_URL"
          head -c 200 /tmp/r2; echo; echo

          echo "=== Test 3: browser UA + apiKey (the real scenario) ==="
          curl -sS -o /tmp/r3 -w "HTTP %{http_code}  time=%{time_total}s\n" --max-time 20 \
            -H "User-Agent: $UA_BROWSER" \
            -H "apiKey: $NVD_API_KEY" \
            "$NVD_URL"
          head -c 200 /tmp/r3; echo; echo

          echo "=== Summary ==="
          t3=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 \
            -H "User-Agent: $UA_BROWSER" \
            -H "apiKey: $NVD_API_KEY" \
            "$NVD_URL")
          if [ "$t3" = "200" ]; then
            echo "DIRECT NVD CALLS WORK from this runner. Proxy can be retired."
          else
            echo "DIRECT NVD CALLS BLOCKED (HTTP $t3). Keep the proxy."
          fi
